  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

s:4px;overflow:hidden\">\n        <div style=\"height:100%;border-radius:4px;background:#dceeb1;transition:width .35s cubic-bezier(.4,0,.2,1);width:{{ rfWidthPct }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ portVisible }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"margin:16px 16px 0\">\n      <div style=\"background:#dceeb1;border-radius:24px;padding:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px\">\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#000;text-transform:uppercase;letter-spacing:.5px\">평가금액<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:700;color:#000;margin-top:6px\">{{ portValue }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.55);margin-top:4px\">{{ portUpdated }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#000;text-transform:uppercase;letter-spacing:.5px\">총손익<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:700;color:#000;margin-top:6px\">{{ portProfit }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"margin:16px 16px 0\">\n    <div style=\"background:#c8e6cd;border-radius:24px;padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;color:#000;text-transform:uppercase\">USD/KRW<\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:700;margin-top:5px;color:#000\">{{ ovFx }}<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:700;margin-top:3px;color:{{ ovFxColor }}\">{{ ovFxSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;color:#000;text-transform:uppercase\">JPY/KRW<\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:700;margin-top:5px;color:#000\">{{ ovJpy }}<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:700;margin-top:3px;color:{{ ovJpyColor }}\">{{ ovJpySub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;color:#000;text-transform:uppercase\">기준일<\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:700;margin-top:5px;color:#000;line-height:1.3\">{{ ovDate }}<\u002Fdiv>\n        <div style=\"font-size:10px;margin-top:3px;color:rgba(0,0,0,.55)\">{{ ovTime }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;color:#000;text-transform:uppercase\">분위기<\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:700;margin-top:5px;color:#000\">{{ ovMood }}<\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:700;margin-top:3px;color:#000\">{{ ovMoodSub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin:20px 16px 0\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px\">주요 지수<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n      <sc-for list=\"{{ idxList }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <div style=\"border:1px solid #000;border-radius:50px;padding:8px 14px;font-size:11px;white-space:nowrap\">\n          <span style=\"font-weight:700;color:#000\">{{ item.n }}<\u002Fspan>\n          <span style=\"font-weight:700;margin-left:6px;color:{{ item.chgColor }}\">{{ item.chgText }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin:20px 16px 0\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px\">국내 보유 종목 <span style=\"text-transform:none;letter-spacing:0;color:rgba(0,0,0 ED.idx.map(x=>({...x})),\n    kr: SEED.kr.map(x=>({...x})),\n    us: SEED.us.map(x=>({...x})),\n    live: false,\n    holdingsLoaded: false,\n    portVisible: false,\n    portValue: '—',\n    portUpdated: '',\n    portProfitText: '—',\n    portProfitColor: '#000',\n    activeTicker: null,\n    activeName: null,\n    chartTitle: '',\n    refreshing: false,\n    rfPct: 0,\n    rfLabel: '',\n    discLoading: true,\n    discItems: null,\n    newsLoading: true,\n    newsItems: null,\n    statusText: '2026.05.05 장 마감 기준 시드 데이터'\n  };\n\n  componentDidMount() {\n    this.loadHoldings().then(() => {\n      this.loadCompanyNews();\n      this.loadNews();\n    });\n  }\n\n  sleep(ms) { return new Promise(r => setTimeout(r, ms)); }\n\n  safeparse(res) {\n    if (res == null) return null;\n    if (typeof res === 'string') { try { return JSON.parse(res); } catch(e) { return null; } }\n    if (Array.isArray(res.content) && res.content.length > 0) {\n      const txt = res.content[0] && res.content[0].text;\n      if (typeof txt === 'string' && txt) { try { return JSON.parse(txt); } catch(e) { return null; } }\n      if (typeof txt === 'object' && txt != null) return txt;\n    }\n    if (typeof res.result === 'string') { try { return JSON.parse(res.result); } catch(e) { return null; } }\n    if (res.result !== undefined && res.result !== null && typeof res.result === 'object') return res.result;\n    return res;\n  }\n\n  fmtPrice(p, isKRW) {\n    if (p == null || isNaN(p)) return '—';\n    if (isKRW) return p.toLocaleString('ko-KR');\n    return p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});\n  }\n\n  fmtQty(q) {\n    if (q == null || isNaN(q)) return '';\n    return (Math.abs(q % 1) > 0) ? q.toLocaleString('ko-KR', {maximumFractionDigits:4}) : q.toLocaleString('ko-KR');\n  }\n\n  fmtChg(c, r, isKRW, isUS) {\n    if (c == null || isNaN(c)) return {txt:'—', cls:'flat'};\n    const sign = c >= 0 ? '+' : '';\n    let cv;\n    if (isKRW) { cv = Math.abs(c) >= 1 ? c.toLocaleString('ko-KR', {maximumFractionDigits:0}) : c.toFixed(2); }\n    else { cv = Math.abs(c) >= 10 ? c.toFixed(1) : c.toFixed(2); }\n    const pv = r != null ? (' (' + (r >= 0 ? '+' : '') + r.toFixed(2) + '%)') : '';\n    let cls;\n    if (isUS) cls = c > 0.001 ? 'us-up' : c < -0.001 ? 'us-dn' : 'flat';\n    else cls = c > 0.001 ? 'up' : c < -0.001 ? 'down' : 'flat';\n    return { txt: sign + cv + pv, cls };\n  }\n\n  colorFor(cls) {\n    if (cls === 'up') return '#c8102e';\n    if (cls === 'down') return '#2563eb';\n    if (cls === 'us-up') return '#1a7a3c';\n    if (cls === 'us-dn') return '#c8102e';\n    return 'rgba(0,0,0,.4)';\n  }\n\n  async whenCowork() {\n    return !!(window.cowork && typeof window.cowork.callMcpTool === 'function');\n  }\n\n  async fetchStockDirect(ticker) {\n    for (let attempt = 0; attempt < 2; attempt++) {\n      if (attempt > 0) await this.sleep(1500);\n      try {\n        const url = '/api/stock?ticker=' + encodeURIComponent(ticker) + '&range=1d&interval=1d';\n        const res = await fetch(url, { cache: 'no-store' });\n        if (!res.ok) continue;\n        const json = await res.json();\n        const result = json && json.chart && json.chart.result && json.chart.result[0];\n        if (!result) continue;\n        const meta = result.meta;\n        const rawP = meta.regularMarketPrice != null ? meta.regularMarketPrice : meta.previousClose;\n        if (rawP == null) continue;\n        const prev = meta.chartPreviousClose != null ? meta.chartPreviousClose : (meta.previousClose != null ? meta.previousClose : rawP);\n        const chg = rawP - prev;\n        const pct = prev ? (chg / prev) * 100 : 0;\n        return { p: rawP, c: chg, r: pct };\n      } catch(e) {}\n    }\n    return null;\n  }\n\n  async fetchHistoricalDirect(ticker) {\n    const candidates = /^\\d{6}$/.test(ticker) ? [ticker + '.KS', ticker + '.KQ'] : [ticker];\n    for (const tk of candidates) {\n      try {\n        const url = '/api/stock?ticker=' + encodeURIComponent(tk) + '&range=1mo&interval=1d';\n        const res = await fetch(url, { cache: 'no-store' });\n        if (!res.ok) continue;\n        const json = await res.json();\n        const result = json && json.chart && json.chart.result && json.chart.result[0];\n        if (!result) continue;\n        const timestamps = result.timestamp || [];\n        const closes = (result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close) || [];\n        if (!timestamps.length) continue;\n        const labels = timestamps.map(ts => { const d = new Date(ts * 1000); return (d.getMonth() + 1) + '/' + d.getDate(); });\n        return { labels, vals: closes };\n      } catch(e) {}\n    }\n    return null;\n  }\n\n  async fetchNaverNews(query, count) {\n    try {\n      const url = '/api/news?q=' + encodeURIComponent(query) + '&n=' + (count || 8) + '&_t=' + Date.now();\n      const res = await fetch(url, { cache: 'no-store' });\n      if (!res.ok) return null;\n      const json = await res.json();\n      return json && json.items || null;\n    } catch(e) { return null; }\n  }\n\n  async fetchNaverNewsBatch() {\n    try {\n      const names = [].concat(this.state.kr.map(x => x.n), this.state.us.map(x => x.n)).join(',');\n      const url = '/api/news?names=' + encodeURIComponent(names) + '&n=1&_t=' + Date.now();\n      const res = await fetch(url, { cache: 'no-store' });\n      if (!res.ok) return null;\n      const json = await res.json();\n      return json && json.items || null;\n    } catch(e) { return null; }\n  }\n\n  async getStockData(ticker) {\n    if (window.cowork && typeof window.cowork.callMcpTool === 'function') return await this.fetchStock(ticker);\n    return await this.fetchStockDirect(ticker);\n  }\n\n  async fetchHoldings() {\n    try {\n      const res = await fetch('/api/holdings', { cache: 'no-store' });\n      if (!res.ok) return null;\n      return await res.json();\n    } catch(e) { return null; }\n  }\n\n  applyHoldings(data) {\n    if (!data || !Array.isArray(data.items)) return false;\n    const krItems = [], usItems = [];\n    data.items.forEach(it => {\n      const isKRW = (it.currency === 'KRW') || (it.market === 'KR');\n      const ratePct = (it.profitRate != null) ? it.profitRate * 100 : null;\n      const isSixDigit = /^\\d{6}$/.test(it.symbol || '');\n      const obj = {\n        t: isKRW && isSixDigit ? (it.symbol + '.KS') : it.symbol,\n        symbol: it.symbol, n: it.name || it.symbol, p: it.lastPrice, c: it.profitAmount,\n        r: ratePct, qty: it.quantity, avgPrice: it.avgPrice, currency: it.currency, _live: true\n      };\n      if (isKRW) krItems.push(obj); else usItems.push(obj);\n    });\n    const mvKrw = (data.marketValue && data.marketValue.krw) || 0;\n    const mvUsd = (data.marketValue && data.marketValue.usd) != null ? data.marketValue.usd : null;\n    const plKrw = (data.profitLoss && data.profitLoss.krw) || 0;\n    const plRatePct = (data.profitLoss && data.profitLoss.rate != null) ? data.profitLoss.rate * 100 : null;\n    const r = this.fmtChg(plKrw, plRatePct, true);\n    this.setState({\n      kr: krItems.length ? krItems : this.state.kr,\n      us: usItems.length ? usItems : this.state.us,\n      holdingsLoaded: true,\n      portVisible: !!(krItems.length || usItems.length),\n      portValue: '₩' + Math.round(mvKrw).toLocaleString('ko-KR') + (mvUsd ? (' + $' + mvUsd.toLocaleString('en-US',{maximumFractionDigits:2})) : ''),\n      portProfitText: r.txt,\n      portProfitColor: this.colorFor(r.cls),\n      portUpdated: data.updatedAt ? ('업데이트: ' + new Date(data.updatedAt).toLocaleTimeString('ko-KR')) : ''\n    });\n    return true;\n  }\n\n  async loadHoldings() {\n    const data = await this.fetchHoldings();\n    if (data) return this.applyHoldings(data);\n    return false;\n  }\n\n  async fetchStock(ticker) {\n    for (let i = 0; i < 3; i++) {\n      if (i > 0) await this.sleep(800);\n      try {\n        const res = await window.cowork.callMcpTool(T_STOCK, {ticker});\n        const d = this.safeparse(res);\n        if (!d) continue;\n        const rawP = d.regularMarketPrice != null ? d.regularMarketPrice : (d.currentPrice != null ? d.currentPrice : d.previousClose);\n        if (rawP == null) continue;\n        const prev = d.regularMarketPreviousClose != null ? d.regularMarketPreviousClose : (d.previousClose != null ? d.previousClose : rawP);\n        const chg = d.regularMarketChange != null ? d.regularMarketChange : (rawP - prev);\n        const pct = d.regularMarketChangePercent != null ? d.regularMarketChangePercent : (prev ? chg/prev*100 : 0);\n        return {p: rawP, c: chg, r: pct};\n      } catch(e) {}\n    }\n    return null;\n  }\n\n  applyJob(job, d) {\n    if (job.type === 'usd') this.setState({usd: {p:d.p,c:d.c,r:d.r}});\n    else if (job.type === 'jpy') this.setState({jpy: {p:d.p,c:d.c,r:d.r}});\n    else if (job.type === 'idx') this.setState(s => ({idx: s.idx.map(o => o.t === job.t ? Object.assign({}, o, {p:d.p, c:d.c, r:d.r}) : o)}));\n  }\n\n  async doRefresh() {\n    this.setState({refreshing: true, rfPct: 0, rfLabel: '연결 확인 중…'});\n    await this.sleep(150);\n    this.setState({rfPct: 5, rfLabel: '내 보유종목 동기화 중…'});\n    await this.loadHoldings();\n    this.setState({rfPct: 15, rfLabel: '내 보유종목 동기화 완료'});\n\n    const jobs = [\n      {type:'usd', t:'KRW=X', lbl:'USD/KRW 환율'},\n      {type:'jpy', t:'JPYKRW=X', lbl:'JPY/KRW 환율'}\n    ].concat(this.state.idx.map(x=>({type:'idx', t:x.t, lbl:x.n})));\n    const total = jobs.length;\n    let n = 0;\n    const failed = [];\n    for (const job of jobs) {\n      await this.sleep(200);\n      this.setState({rfPct: 15 + (n / total) * 75, rfLabel: job.lbl + ' 업데이트 중… (' + (n + 1) + '/' + total + ')'});\n      const d = await this.getStockData(job.t);\n      n++;\n      if (!d) { failed.push(job); continue; }\n      this.applyJob(job, d);\n    }\n    if (failed.length > 0) {\n      this.setState({rfPct: 95, rfLabel: '⚠️ ' + failed.length + '개 실패 — 재시도 중…'});\n      for (const job of failed) {\n        await this.sleep(300);\n        const d = await this.getStockData(job.t);\n        if (!d) continue;\n        this.applyJob(job, d);\n      }\n    }\n    const ts = new Date().toLocaleTimeString('ko-KR');\n    this.setState({live: true, rfPct: 100, rfLabel: '✅ 업데이트 완료', statusText: '✅ 마지막 업데이트: ' + ts});\n    await this.sleep(1200);\n    this.setState({refreshing: false});\n    this.loadCompanyNews();\n    this.loadNews();\n  }\n\n  async onCardClick(ticker, name, isKRW) {\n    if (this.state.activeTicker === ticker) { this.closeChart(); return; }\n    this.setState({ activeTicker: ticker, activeName: name, chartTitle: name + ' — 불러오는 중…' });\n    const seed = CHART_SEEDS[ticker];\n    if (!this.state.live && !this.state.holdingsLoaded && seed) {\n      this.setState({ chartTitle: name + ' — 30일 가격 추이' }, () => this.drawChart(seed.labels, seed.vals, seed.krw));\n      return;\n    }\n    try {\n      let chartData = null;\n      if (window.cowork && typeof window.cowork.callMcpTool === 'function') {\n        const res = await window.cowork.callMcpTool(T_HIST, { ticker, period: '1mo', interval: '1d' });\n        const data = this.safeparse(res);\n        const rows = Array.isArray(data) ? data : ((data && (data.prices || data.data)) || []);\n        if (rows && rows.length) {\n          const labels = rows.map(h => { const d = new Date(h.Date || h.date || h.Datetime || ''); return (d.getUTCMonth() + 1) + '/' + d.getUTCDate(); });\n          chartData = { labels, vals: rows.map(h => +(h.Close || h.close || h['Adj Close'] || 0)) };\n        }\n      } else {\n        chartData = await this.fetchHistoricalDirect(ticker);\n      }\n      if (chartData && chartData.labels.length) {\n        this.setState({ chartTitle: name + ' — 30일 가격 추이' }, () => this.drawChart(chartData.labels, chartData.vals, isKRW));\n      } else throw new Error('empty');\n    } catch(e) {\n      if (seed) { this.setState({ chartTitle: name + ' — 30일 가격 추이' }, () => this.drawChart(seed.labels, seed.vals, seed.krw)); return; }\n      this.setState({ chartTitle: name + ' — 데이터 없음' });\n    }\n  }\n\n  closeChart() {\n    if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }\n    this.setState({ activeTicker: null, activeName: null, chartTitle: '' });\n  }\n\n  drawChart(labels, vals, isKRW) {\n    if (!window.Chart || !this.chartRef.current) return;\n    if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }\n    const isUp = vals[vals.length - 1] >= vals[0];\n    const color = isKRW ? (isUp ? '#c8102e' : '#2563eb') : (isUp ? '#1a7a3c' : '#c8102e');\n    const fmtTip = isKRW ? (c => c.parsed.y.toLocaleString('ko-KR') + '원') : (c => '$' + c.parsed.y.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}));\n    this.chartInstance = new window.Chart(this.chartRef.current.getContext('2d'), {\n      type: 'line',\n      data: { labels, datasets: [{ data: vals, borderColor: color, backgroundColor: color + '18', borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5, fill: true, tension: 0.35 }] },\n      options: {\n        responsive: true,\n        plugins: { legend: {display:false}, tooltip: {callbacks: {label: fmtTip}} },\n        scales: {\n          y: { grid: {color:'#f1f1f1'}, ticks: { callback: v => isKRW ? v.toLocaleString('ko-KR') : ('$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})), font: {size:10} } },\n          x: { grid: {display:false}, ticks: {font:{size:10}} }\n        }\n      }\n    });\n  }\n\n  renderNewsItems(items) {\n    return (items || []).slice(0, 12).map(n => {\n      const title = (n.title || '').replace(/<[^>]+>/g, '');\n      const desc = (n.description || '').replace(/<[^>]+>/g, '');\n      const link = n.originallink || n.link || '#';\n      const dt = n.pubDate ? new Date(n.pubDate).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';\n      return { title, desc, dt, link };\n    });\n  }\n\n  async loadCompanyNews() {\n    this.setState({ discLoading: true });\n    const ready = await this.whenCowork();\n    if (!ready) {\n      const items = await this.fetchNaverNewsBatch();\n      this.setState({ discLoading: false, discItems: this.renderNewsItems(items) });\n      return;\n    }\n    const targets = [].concat(this.state.kr.map(x => x.n), this.state.us.map(x => x.n));\n    const allItems = [];\n    for (const name of targets) {\n      try {\n        await this.sleep(200);\n        const res = await window.cowork.callMcpTool(T_NEWS, { query: name + ' 주가', display: 1, sort: 'date' });\n        const data = this.safeparse(res);\n        const items = (data && (data.items || data.data || (data.result && data.result.items))) || (Array.isArray(data) ? data : null);\n        if (Array.isArray(items) && items.length) allItems.push(items[0]);\n      } catch(e) {}\n    }\n    allItems.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));\n    this.setState({ discLoading: false, discItems: this.renderNewsItems(allItems) });\n  }\n\n  async loadNews() {\n    this.setState({ newsLoading: true });\n    const ready = await this.whenCowork();\n    if (!ready) {\n      const items = await this.fetchNaverNews('코스피 증시 시황', 8);\n      this.setState({ newsLoading: false, newsItems: this.renderNewsItems(items) });\n      return;\n    }\n    try {\n      const res = await window.cowork.callMcpTool(T_NEWS, { query: '코스피 증시 시황', display: 8, sort: 'date' });\n      const data = this.safeparse(res);\n      const items = (data && (data.items || data.data || (data.result && data.result.items))) || (Array.isArray(data) ? data : null);\n      this.setState({ newsLoading: false, newsItems: this.renderNewsItems(items) });\n    } catch(e) { this.setState({ newsLoading: false, newsItems: [] }); }\n  }\n\n  computeOverview() {\n    const now = new Date();\n    const days = ['일','월','화','수','목','금','토'];\n    const usdTxt = this.state.usd.p ? ('₩' + this.state.usd.p.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})) : '—';\n    const u = this.fmtChg(this.state.usd.c, this.state.usd.r, false, true);\n    const jpy100p = this.state.jpy.p * 100;\n    const jpy100c = this.state.jpy.c * 100;\n    const jpyTxt = jpy100p ? ('₩' + jpy100p.toFixed(2)) : '—';\n    const j = this.fmtChg(jpy100c, this.state.jpy.r, false, true);\n    const dateTxt = (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + days[now.getDay()] + ')';\n    const timeTxt = this.state.live ? (now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 실시간') : '시드 데이터 (2026.05.05)';\n    const kospi = this.state.idx.find(x => x.t === '^KS11');\n    let mood = '😐 보합', moodSub = '—', moodCls = 'flat';\n    if (kospi && kospi.r != null) {\n      const r = kospi.r;\n      if (r > 2) { mood = '🔥 강세장'; moodCls = 'up'; }\n      else if (r > 0.5) { mood = '📈 상승세'; moodCls = 'up'; }\n      else if (r > -0.5) { mood = '😐 보합'; moodCls = 'flat'; }\n      else if (r > -2) { mood = '📉 하락세'; moodCls = 'down'; }\n      else { mood = '❄️ 약세장'; moodCls = 'down'; }\n      moodSub = 'KOSPI ' + (r >= 0 ? '+' : '') + r.toFixed(2) + '%';\n    }\n    return {\n      ovFx: usdTxt, ovFxSub: u.txt, ovFxColor: this.colorFor(u.cls),\n      ovJpy: jpyTxt, ovJpySub: j.txt, ovJpyColor: this.colorFor(j.cls),\n      ovDate: dateTxt, ovTime: timeTxt,\n      ovMood: mood, ovMoodSub: moodSub, ovMoodColor: this.colorFor(moodCls)\n    };\n  }\n\n  renderVals() {\n    const ov = this.computeOverview();\n    const idxList = this.state.idx.map(x => {\n      const r = this.fmtChg(x.c, x.r, x.krw);\n      return Object.assign({}, x, { priceText: this.fmtPrice(x.p, x.krw), chgText: r.txt, chgColor: this.colorFor(r.cls) });\n    });\n    const krList = this.state.kr.map(item => {\n      const r = this.fmtChg(item.c, item.r, true);\n      const isActive = this.state.activeTicker === item.t;\n      const qtyLine = item.qty != null ? ((item.symbol||item.t).replace('.KS','') + ' · ' + this.fmtQty(item.qty) + '주') : item.t.replace('.KS','');\n      return Object.assign({}, item, { qtyLine, priceText: item.p ? this.fmtPrice(item.p, true) : '—', chgText: item.r != null ? r.txt : '—', chgColor: this.colorFor(r.cls), borderColor: isActive ? '#000' : 'transparent', onClick: () => this.onCardClick(item.t, item.n, true) });\n    });\n    const usList = this.state.us.map(item => {\n      const r = this.fmtChg(item.c, item.r, false, true);\n      const isActive = this.state.activeTicker === item.t;\n      const qtyLine = item.qty != null ? (item.t + ' · ' + this.fmtQty(item.qty) + '주') : item.t;\n      return Object.assign({}, item, { qtyLine, priceText: item.p != null ? this.fmtPrice(item.p, false) : '—', chgText: item.r != null ? r.txt : '—', chgColor: this.colorFor(r.cls), borderColor: isActive ? '#000' : 'transparent', onClick: () => this.onCardClick(item.t, item.n, false) });\n    });\n\n    return Object.assign({\n      headerSub: this.state.live ? '실시간 업데이트 중' : '5월 5일(화) 장 마감 기준',\n      refreshing: this.state.refreshing,\n      refreshBtnLabel: this.state.refreshing ? '로딩 중…' : '새로고침',\n      onRefresh: () => this.doRefresh(),\n      rfLabel: this.state.rfLabel,\n      rfPctText: Math.round(this.state.rfPct) + '%',\n      rfWidthPct: Math.round(this.state.rfPct) + '%',\n      portVisible: this.state.portVisible,\n      portValue: this.state.portValue,\n      portUpdated: this.state.portUpdated,\n      portProfit: this.state.portProfitText,\n      portProfitColor: this.state.portProfitColor,\n      idxList,\n      krList,\n      usList,\n      chartVisible: !!this.state.activeTicker,\n      chartTitle: this.state.chartTitle,\n      chartRef: this.chartRef,\n      onCloseChart: () => this.closeChart(),\n      discLoading: this.state.discLoading,\n      discEmpty: !this.state.discLoading && (!this.state.discItems || this.state.discItems.length === 0),\n      discItems: this.state.discItems || [],\n      newsLoading: this.state.newsLoading,\n      newsEmpty: !this.state.newsLoading && (!this.state.newsItems || this.state.newsItems.length === 0),\n      newsItems: this.state.newsItems || [],\n      statusText: this.state.statusText\n    }, ov);\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
